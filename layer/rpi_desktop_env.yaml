# METABEGIN
# X-Env-Layer-Name: rpi-desktop-env
# X-Env-Layer-Category: rpi
# X-Env-Layer-Desc: Installs Raspberry Pi OS's desktop environment.
#
# X-Env-VarPrefix: rpi
#
# METAEND
---
mmdebstrap:
  packages:

    # Install all Raspberry Pi OS Desktop packages
    - rpd-wayland-core
    - rpd-wayland-extras
    - rpd-theme
    - rpd-preferences
    - rpd-applications
    - rpd-graphics
    - rpd-developer
    - rpd-utilities