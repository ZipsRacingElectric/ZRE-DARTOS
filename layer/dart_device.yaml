# METABEGIN
# X-Env-Layer-Name: dart-device
# X-Env-Layer-Category: dart
# X-Env-Layer-Desc: Device layer for the DART. This configures everything hardware-specific to the DART, mainly, the device's
#   CAN interfaces.
#
# X-Env-VarPrefix: dart
#
# METAEND
---
mmdebstrap:

  packages:

    # iproute2 provides the 'ip' command. Used for setting up CAN devices (init_system's pre_exec shell script).
    - iproute2

    # can-utils provides common utilities for working with CAN devices. Not needed, but very useful in debugging.
    - can-utils

  customize-hooks:

    # Copy the bootloader configuration file. See doc/can_bus_configuration.md for details.
    - cp rootfs/boot/firmware/config.txt $1/boot/firmware/config.txt