# METABEGIN
# X-Env-Layer-Name: resize-fs
# X-Env-Layer-Category: filesystem
# X-Env-Layer-Desc: TODO(Barach)
#
# X-Env-VarPrefix: resize-fs
#
# METAEND
---
mmdebstrap:
  packages:
    - fdisk
  customize-hooks:
    - cp ./resize_fs.sh $1/root/
    - cp ./resize_fs.service $1/etc/systemd/system/
    - uchroot $1 'chmod +x /root/resize_fs.sh'
    - $BDEBSTRAP_HOOKS/enable-units "$1" resize_fs