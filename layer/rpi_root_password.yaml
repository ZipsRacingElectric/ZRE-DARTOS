# METABEGIN
# X-Env-Layer-Name: rpi-root-password
# X-Env-Layer-Category: rpi
# X-Env-Layer-Desc: Sets a password for the root user. The rpi-user-credentials layer doesn't let you do this, so it needs a
#   custom layer.
#
# X-Env-VarPrefix: rpi_root
#
# X-Env-Var-password:
# X-Env-Var-password-Desc: The password to use.
# X-Env-Var-password-Required: y
# X-Env-Var-password-Valid: string
# X-Env-Var-password-Set: y
#
# METAEND
---
mmdebstrap:

  customize-hooks:

    - chroot "$1" /bin/sh -c 'echo root:${IGconf_rpi_root_password} | chpasswd'